<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
  (function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Plate - Renu's Food Corner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="images/logo.png">
<style>
  #nav { background: var(--bg2) !important; border-bottom: 1px solid var(--border) !important; padding: 16px 60px !important; box-shadow: var(--shadow-nav) !important; }
  @media(max-width:900px) { #nav { padding: 10px 24px !important; } }
  
  .cart-container { max-width: 800px; margin: 160px auto 100px; padding: 0 24px; min-height: 50vh; }
  .cart-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px; margin-bottom: 16px; transition: all 0.3s; box-shadow: var(--shadow-card); }
  .cart-item:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
  .cart-item-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; background: var(--surface2); }
  .cart-item-info { flex: 1; margin-left: 20px; }
  .cart-item-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .cart-item-price { color: var(--gold); font-size: 16px; font-weight: 500; }
  .cart-controls { display: flex; align-items: center; gap: 12px; background: var(--bg2); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .qty-btn { background: transparent; border: none; color: var(--text); font-size: 16px; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
  .qty-btn:hover { background: var(--surface); color: var(--gold); }
  .qty-val { font-size: 14px; font-weight: 700; width: 20px; text-align: center; }
  .cart-item-total { font-weight: 700; font-size: 18px; width: 80px; text-align: right; margin-left: 20px; }
  .remove-btn { background: transparent; border: none; color: var(--red); font-size: 20px; cursor: pointer; margin-left: 16px; transition: transform 0.2s; }
  .remove-btn:hover { transform: scale(1.2); }
  
  .cart-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 24px; margin-top: 32px; text-align: right; box-shadow: var(--shadow-card); }
  .grand-total { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 24px; }
  .grand-total span { color: var(--gold); font-weight: 700; }
  .whatsapp-btn { background: #25D366; color: #fff; border: none; padding: 16px 32px; border-radius: var(--radius-btn); font-size: 16px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; text-decoration: none; box-shadow: var(--shadow-btn); }
  .whatsapp-btn:hover { background: #1ebd5a; transform: translateY(-2px); box-shadow: var(--shadow-btn-hover); }
  
  .empty-cart { text-align: center; padding: 60px 0; color: var(--text2); }
  .empty-cart-icon { font-size: 64px; margin-bottom: 16px; }
  
  @media(max-width: 600px) {
    .cart-item { flex-direction: column; align-items: flex-start; position: relative; }
    .cart-item-img { width: 100%; height: 160px; margin-bottom: 16px; }
    .cart-item-info { margin-left: 0; margin-bottom: 16px; }
    .cart-item-right { width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .remove-btn { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.5); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0; }
  }
</style>
</head>
<body>

<nav id="nav">
  <div style="display:flex; align-items:center; gap: 20px;">
    <a href="index.html" class="nav-logo" style="text-decoration: none;">Renu's</a>
  </div>
  <div style="display:flex; align-items:center; gap:16px;">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="sun-icon">☀️</span>
      <span class="moon-icon">🌙</span>
    </button>
    <a href="index.html" class="nav-order">← Back to Home</a>
  </div>
</nav>

<div class="cart-container">
  <div class="reveal" style="text-align: center; margin-bottom: 40px;">
    <span class="section-tag">Your Selection</span>
    <h2 class="section-title">My <em>Plate</em></h2>
    <div class="section-line" style="margin: 0 auto;"></div>
  </div>
  
  <div id="cartItemsContainer">
    <!-- Cart items rendered here -->
  </div>
  
  <div id="cartSummaryContainer" style="display: none;">
    <div class="cart-summary reveal">
      <div class="grand-total">Total Amount: <span id="grandTotalVal">₹0</span></div>
      <button class="whatsapp-btn" onclick="placeOrder()">Place Order on WhatsApp</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>

  // Render cart items
  function renderCart() {
    const container = document.getElementById('cartItemsContainer');
    const summary = document.getElementById('cartSummaryContainer');

    // Empty cart
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-cart reveal visible">
          <div class="empty-cart-icon">🍽️</div>
          <h3>Your plate is empty</h3>
          <p style="margin-top:12px; margin-bottom:24px;">
            Looks like you haven't added anything yet.
          </p>

          <a href="full-menu.html" class="nav-order">
            Explore Menu
          </a>
        </div>
      `;

      summary.style.display = 'none';
      return;
    }

    let total = 0;

    container.innerHTML = cart.map((item, index) => {

      const quantity = item.quantity || 1;
      const itemTotal = item.price * quantity;

      total += itemTotal;

      return `
        <div class="cart-item reveal visible">

          <img 
            src="${item.img || 'images/logo.png'}" 
            class="cart-item-img" 
            alt="${item.name}"
          >

          <div class="cart-item-info">
            <div class="cart-item-name">
              ${item.name}
            </div>

            <div class="cart-item-price">
              ₹${item.price}
            </div>
          </div>

          <div class="cart-item-right">

            <div class="cart-controls">

              <button 
                class="qty-btn"
                onclick="updateQty(${index}, -1)"
              >
                -
              </button>

              <div class="qty-val">
                ${quantity}
              </div>

              <button 
                class="qty-btn"
                onclick="updateQty(${index}, 1)"
              >
                +
              </button>

            </div>

            <div class="cart-item-total">
              ₹${itemTotal}
            </div>

            <button 
              class="remove-btn"
              onclick="removeItem(${index})"
            >
              ×
            </button>

          </div>

        </div>
      `;
    }).join('');

    document.getElementById('grandTotalVal').innerText = `₹${total}`;

    summary.style.display = 'block';
  }

  // Quantity update
  function updateQty(index, delta) {

    if (!cart[index].quantity) {
      cart[index].quantity = 1;
    }

    cart[index].quantity += delta;

    if (cart[index].quantity <= 0) {
      cart.splice(index, 1);
    }

    saveCart();
    renderCart();
  }

  // Remove item
  function removeItem(index) {
    cart.splice(index, 1);

    saveCart();
    renderCart();
  }

  // WhatsApp order
  function placeOrder() {

    let text = `Hello RFC 👋

I would like to order:

`;

    let total = 0;

    cart.forEach((item, index) => {

      const qty = item.quantity || 1;
      const itemTotal = item.price * qty;

      total += itemTotal;

      const qtyText = qty > 1 ? ` x${qty}` : '';
      text += `${index + 1}. ${item.name}${qtyText} - ₹${itemTotal}\n`;
    });

    text += `

Total Amount: ₹${total}

Please confirm my order.`;

    const phone = "916381883013";

    const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    window.open(url, '_blank');
  }

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {

    console.log(cart);

    renderCart();
  });
</script>
</body>
</html>
